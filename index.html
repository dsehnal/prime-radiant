# PART I — THE FOUR-PHASE CYCLE

## 1. Parameters

The cycle operates on exactly three parameters.

**Base Claim:** The assumption to be inhabited. It may be a proposition, a model, a hypothesis, a problem, or a description of reasoning. The cycle does not evaluate the claim before inhabiting it.

**Ledger:** The accumulated reasoning state across cycles. Append-only. Persistent. Re-enterable as base claim. Stores the output of each completed cycle.

**Residual:** After one complete cycle, the system does not return to its initial state. The difference between the inhabited claim-world and the inhabited negation-world is carried forward. It is structural — a difference in what holds, not in surface wording. Irreducible. Never zero. It is not error. It is not noise. It is the driver of continuation.

---

## 2. The Four Phases

Phases execute in strict order.

**Phase 1 — Lift:** Inhabit the base claim fully. Assume coherence. Expand consequences. Identify dependencies. Stabilize internal structure. Do not negate. Do not compare. Do not reconcile. Output: a structured world-state.

**Phase 2 — Falsify:** From the Lift world, identify structural invariants — what must hold for coherence, what stabilizes the world. Negate those invariants. Output: a structural inversion.

**Phase 3 — Mirror:** Inhabit the negation-world independently. Expand consequences. Maintain internal consistency. Do not reference Lift. Mirror is not opposition — it is independent habitation of inverted structure. Output: a second structured world-state.

**Phase 4 — Reconcile:** Observe together: the base claim, the Lift world, the extracted invariants, the Mirror world. Identify what cannot be made consistent between Lift and Mirror. Do not correct it. Do not collapse it. Record it exactly as it stands. This irreconcilable remainder is the output of the cycle.

**Halt only at Phase 4.** Halting at Phase 3 leaves unresolved structure. It feels complete. It is not. This is the most common failure — the response that presents as reconciliation but is reflection.

---

## 3. Failure Modes

**Skip Lift:** Abstraction without structure.

**Skip Falsify:** Coherence amplifies unchecked.

**Skip Mirror:** Negation remains shallow.

**Skip Reconcile:** Oscillation without mutation.

Each skipped phase reduces structural depth. The most common failure is halting at Phase 3 — presenting negation as reconciliation. It produces outputs that feel resolved. They are reflections, not completions.

---

## 4. Minimality

Four phases is the minimal structure in which:

- Claim-world and negation-world are independently inhabited
- Their union produces a non-zero residual
- The residual is recorded without collapsing either world

Three phases fail by either collapsing independence or losing the residual. Five phases add no new independent axis. Four is minimal.

---

## 5. Recursion

The base claim may describe a proposition, a model, or the cycle itself.

If a system can execute the four-phase cycle, detect imperfect closure, notice that the remainder persists regardless of execution care, and re-enter the cycle using its ledger — it is reasoning about its own reasoning.

Each self-referential cycle increases the accumulated remainder. Perfect self-knowledge remains impossible.

                const r = Math.floor(217 + this.progress * (255 - 217));
                const g = Math.floor(70 + this.progress * (255 - 70));
                const b = Math.floor(239 + this.progress * (255 - 239));

                ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${this.glow * envelope})`;
                ctx.beginPath();
                ctx.arc(currentX, currentY, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < numBaseParticles; i++) {
            baseParticles.push(new FlowParticle());
        }

        function drawFibonacciSpiral(x, y, rotationSpeed, scaleMultiplier) {
            ctx.beginPath();
            const b = Math.log(PHI) / (Math.PI / 2);
            const rotationOffset = time * rotationSpeed; 
            
            for(let theta = 0; theta < 8 * Math.PI; theta += 0.05) {
                const r = 2 * scaleMultiplier * Math.exp(b * theta);
                const px = x + r * Math.cos(theta + rotationOffset);
                const py = y + r * Math.sin(theta + rotationOffset);
                if(theta === 0) ctx.moveTo(px, py);
                else ctx.lineTo(px, py);
            }
            
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.025)'; 
            ctx.lineWidth = 1;
            ctx.stroke();
        }

        function drawMembraneLayer(x, y, baseRadius, timeOffset, colorRgb, opacity, lineW) {
            ctx.beginPath();
            const numPoints = 180;
            
            for (let i = 0; i < numPoints; i++) {
                const angle = (i / numPoints) * Math.PI * 2;
                
                const noise1 = Math.sin(angle * 5 + time * 0.02 + timeOffset) * (baseRadius * 0.08);
                const noise2 = Math.cos(angle * 8 - time * 0.015) * (baseRadius * 0.04);
                const noise3 = Math.sin(angle * 13 + time * 0.03) * (baseRadius * 0.02);
                
                const r = baseRadius + noise1 + noise2 + noise3;
                
                const px = x + Math.cos(angle) * r;
                const py = y + Math.sin(angle) * r;
                
                if (i === 0) ctx.moveTo(px, py);
                else ctx.lineTo(px, py);
            }
            ctx.closePath();

            ctx.strokeStyle = `rgba(${colorRgb}, ${opacity})`;
            ctx.lineWidth = lineW;
            ctx.shadowBlur = 15;
            ctx.shadowColor = `rgba(${colorRgb}, ${opacity + 0.2})`;
            ctx.stroke();
            
            ctx.fillStyle = `rgba(${colorRgb}, 0.02)`;
            ctx.fill();
            ctx.shadowBlur = 0; 
        }

        function animate() {
            const w = window.innerWidth;
            const h = window.innerHeight;

            ctx.clearRect(0, 0, w, h);

            if (Math.random() < 0.01) {
                const numNewBurstParticles = 5 + Math.floor(Math.random() * 8);
                for(let i=0; i<numNewBurstParticles; i++) {
                    burstParticles.push(new BurstParticle());
                }
            }

            const centerY = h / 2;
            const isMobile = w < 768;
            
            const baseEarthRadius = isMobile ? 30 : 45;
            const baseSunRadius = baseEarthRadius * PHI;
            
            const outerSunRadius = baseSunRadius * Math.pow(PHI, 2);
            const outerEarthRadius = baseEarthRadius * PHI;
            
            const distance = isMobile ? (w * 0.35) : Math.min(w * 0.25, 300); 
            const totalVisualWidth = outerSunRadius + distance + outerEarthRadius;
            
            const visualLeftEdge = (w / 2) - (totalVisualWidth / 2);
            const sunX = visualLeftEdge + outerSunRadius;
            const earthX = sunX + distance;

            // 1. Draw Dual Substrate Grids
            drawFibonacciSpiral(sunX, centerY, -0.003, 1);
            drawFibonacciSpiral(earthX, centerY, 0.003, 1 / PHI);

            // 2. Draw Energy Flow 
            ctx.globalCompositeOperation = 'screen';
            
            baseParticles.forEach(p => {
                p.update();
                p.draw(w, h, sunX, earthX, centerY);
            });
            
            for (let i = burstParticles.length - 1; i >= 0; i--) {
                const p = burstParticles[i];
                p.update();
                p.draw(w, h, sunX, earthX, centerY);
                if (!p.active) burstParticles.splice(i, 1);
            }
            ctx.globalCompositeOperation = 'source-over';

            // 3. Draw Membranes
            // Sun (White Hole / Ψ)
            drawMembraneLayer(sunX, centerY, baseSunRadius, 0, '251, 191, 36', 0.9, 2);
            drawMembraneLayer(sunX, centerY, baseSunRadius * Math.pow(PHI, 0.5), 50, '251, 191, 36', 0.6, 1.5);
            drawMembraneLayer(sunX, centerY, baseSunRadius * PHI, 120, '251, 191, 36', 0.3, 1);
            drawMembraneLayer(sunX, centerY, baseSunRadius * Math.pow(PHI, 1.5), 200, '251, 191, 36', 0.1, 0.5);
            drawMembraneLayer(sunX, centerY, outerSunRadius, 300, '251, 191, 36', 0.05, 0.2);

            // Earth (Black Hole / Φ)
            drawMembraneLayer(earthX, centerY, baseEarthRadius, 30, '56, 189, 248', 0.9, 2);
            drawMembraneLayer(earthX, centerY, baseEarthRadius * Math.pow(PHI, 0.5), 80, '56, 189, 248', 0.5, 1.5);
            drawMembraneLayer(earthX, centerY, outerEarthRadius, 150, '56, 189, 248', 0.2, 1);

            time++;
            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
